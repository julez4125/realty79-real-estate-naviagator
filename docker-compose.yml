services:
  postgres:
    image: postgres:16-alpine
    container_name: realty79-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: realty79
      POSTGRES_PASSWORD: realty79dev
      POSTGRES_DB: realty79
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: realty79-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── M0 dev infra (per consensus plan §D.M0) ────────────────────────

  # S3-compatible object storage for PropertyPhoto, Document, exports
  minio:
    image: minio/minio:latest
    container_name: realty79-minio
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # web console
    environment:
      MINIO_ROOT_USER: realty79
      MINIO_ROOT_PASSWORD: realty79dev
    command: server /data --console-address ':9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # Local SMTP+IMAP for M5 dev (mail-in M5.1, mail-out M5.2)
  mailpit:
    image: axllent/mailpit:latest
    container_name: realty79-mailpit
    ports:
      - '1025:1025'   # SMTP
      - '1143:1143'   # IMAP
      - '8025:8025'   # web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_SMTP_TLS_AUTH: 0
    restart: unless-stopped

  # OpenTelemetry traces backend (M0 observability)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: realty79-jaeger
    ports:
      - '16686:16686'  # web UI
      - '4317:4317'    # OTLP gRPC
      - '4318:4318'    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
